name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  tests:
    name: Test and DVC validation
    runs-on: ubuntu-latest
    env:
      MLOPS_PIPELINE_MLFLOW_TRACKING_URI: file://${{ runner.temp }}/mlflow-tracking
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Print dependency versions
        run: |
          python - <<'PY'
          import sys
          from importlib.metadata import version

          packages = [
              "pandas",
              "scikit-learn",
              "PyYAML",
              "dvc",
              "mlflow",
              "pytest",
              "evidently",
          ]

          print(f"Python: {sys.version}")
          for package in packages:
              print(f"{package}: {version(package)}")
          PY

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run pytest suite
        run: python -m pytest tests/ -v

      - name: Verify tracked raw dataset files are present
        run: |
          test -f data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv
          test -f data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv.dvc

      - name: Validate DVC state
        run: |
          if [ -f dvc.yaml ]; then
            python -m dvc repro --dry
          else
            echo "Skipping dvc repro --dry because dvc.yaml is not present in this repository."
          fi
          python -m dvc status

      - name: Verify repository hygiene
        run: |
          git status --short
          if [ -n "$(git diff --name-only)" ]; then
            echo "Unexpected tracked file changes detected:"
            git diff --name-only
            exit 1
          fi
          if [ -n "$(git ls-files -o --exclude-standard)" ]; then
            echo "Unexpected untracked files detected:"
            git ls-files -o --exclude-standard
            exit 1
          fi

  training:
    name: Baseline training and gate
    runs-on: ubuntu-latest
    needs: tests
    env:
      MLOPS_PIPELINE_MLFLOW_TRACKING_URI: file://${{ runner.temp }}/mlflow-tracking
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Print dependency versions
        run: |
          python - <<'PY'
          import sys
          from importlib.metadata import version

          packages = [
              "pandas",
              "scikit-learn",
              "PyYAML",
              "dvc",
              "mlflow",
              "pytest",
              "evidently",
          ]

          print(f"Python: {sys.version}")
          for package in packages:
              print(f"{package}: {version(package)}")
          PY

      - name: Run baseline training and quality gate
        run: python -m mlops_pipeline.train --config configs/train.yaml

      - name: Verify repository hygiene
        run: |
          git status --short
          if [ -n "$(git diff --name-only)" ]; then
            echo "Unexpected tracked file changes detected:"
            git diff --name-only
            exit 1
          fi
          if [ -n "$(git ls-files -o --exclude-standard)" ]; then
            echo "Unexpected untracked files detected:"
            git ls-files -o --exclude-standard
            exit 1
          fi
