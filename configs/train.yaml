project:
  name: complete-mlops-pipeline
  phase: phase-4
  random_seed: 42

data:
  raw_path: data/raw/WA_Fn-UseC_-HR-Employee-Attrition.csv
  processed_path: data/processed/TODO_processed_filename.csv
  production_path: data/production/TODO_production_filename.csv
  target_column: Attrition

split:
  test_size: 0.2
  validation_size: 0.2
  random_state: 42
  stratify: true

features:
  include_columns: []  # TODO: define after dataset audit
  exclude_columns:
    - EmployeeNumber
    - EmployeeCount
    - Over18
    - StandardHours
  categorical_columns: []  # TODO: define after dataset audit
  numeric_columns: []  # TODO: define after dataset audit
  missingness_simulation:
    enabled: true
    fraction: 0.04
    random_seed: 42
    strategy: all_eligible
    columns: []

model:
  algorithm: logistic_regression
  class_weight: balanced
  max_iter: 3000
  params:
    C: 1.0

evaluation:
  primary_metric: f1_attrition
  secondary_metrics:
    - balanced_accuracy
    - roc_auc
    - precision_attrition
    - recall_attrition
    - accuracy
  thresholds:
    f1_attrition: 0.45

mlflow:
  tracking_uri: mlruns
  experiment_name: complete-mlops-pipeline-phase-4
  run_name: baseline-logreg-balanced
  log_model: true

monitoring:
  enabled: true
  random_seed: 42
  reference_batch_size: 300
  production_batch_size: 300
  dataset_drift_threshold: 0.15
  feature_drift_threshold: 0.5
  drift_magnitude:
    numeric_shift: 8
    numeric_scale: 0.75
    categorical_constant_share: 1.0
  drifted_feature_names:
    - Age
    - MonthlyIncome
    - TotalWorkingYears
    - JobRole
    - OverTime
  per_feature_settings:
    Age:
      kind: numeric
      transform: add
      magnitude: 8
      clip_min: 18
      clip_max: 60
    MonthlyIncome:
      kind: numeric
      transform: scale
      magnitude: 0.75
      clip_min: 1000
      clip_max: 20000
    TotalWorkingYears:
      kind: numeric
      transform: add
      magnitude: 5
      clip_min: 0
      clip_max: 60
    JobRole:
      kind: categorical
      transform: set_constant
      value: Sales Representative
    OverTime:
      kind: categorical
      transform: set_constant
      value: "Yes"
  output_paths:
    reference_batch_csv: reports/drift_reference.csv
    stable_batch_csv: reports/drift_stable.csv
    drifted_batch_csv: reports/drift_drifted.csv
    summary_json: reports/drift_summary.json
    html_report: reports/drift_report.html

outputs:
  model_dir: models/
  artifacts_dir: artifacts/
  metrics_path: reports/metrics.json
  dataset_audit_json_path: reports/dataset_audit.json
